<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar producto</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div>
            <h1>Editar producto</h1>
            <p>Modifica los datos del producto seleccionado.</p>
        </div>
    </header>
    <nav>
        <a href="./index.html">Inicio</a>
        <a href="./inventario.html">Inventario</a>
        <a href="./agregar.html">Agregar producto</a>
    </nav>
    <main>
        <section class="panel">
            <h2>Editar producto</h2>
            <form id="productForm">
                <div class="form-grid">
                    <label for="productName">Nombre</label>
                    <input type="text" id="productName" required placeholder="Nombre del producto">

                    <label for="productCategory">Categoría</label>
                    <input type="text" id="productCategory" placeholder="Electrónica, hogar, comida...">

                    <label for="productQuantity">Cantidad</label>
                    <input type="number" id="productQuantity" min="0" value="0" required>

                    <label for="productPrice">Precio unitario</label>
                    <input type="number" id="productPrice" min="0" step="0.01" value="0.00" required>
                </div>
                <div class="form-actions">
                    <button type="submit" id="saveButton">Actualizar producto</button>
                    <a href="./inventario.html" class="secondary-button">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Inventario MEZA. Todos los derechos reservados.</p>
    </footer>
    <script src="../javascript/app.js"></script>
</body>
</html>
